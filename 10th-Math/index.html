<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Portal - For 7th Mathematics</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div class="container">
        <h1>Quiz Portal For 10th Mathematics</h1>

        <label for="studentName"><strong>Student Name:</strong></label>
        <input type="text" id="studentName" placeholder="Enter your name" /><br><br>

        <label for="versionSelect"><strong>Select Version:</strong></label>
        <select id="versionSelect">
            <option value="1">Chapter 1 - Real Numbers(10th)</option>
            <option value="2">Chapter 2 - Polynomials(10th)</option>
            <option value="3">Chapter 3 - Pair of Linear Equations in two variables(10th)</option>
            <option value="4">Chapter 4 - Quadratic Equations(10th)</option>
            <option value="5">Chapter 5 - Aritmetic Progression(10th)</option>
            <option value="6">Chapter 6 - Coordinate Geometry(10th)</option>
            <option value="7">Chapter 7 - Triangles(10th)</option>
            <option value="8">Chapter 8 - Circles(10th)</option>
            <option value="9">Chapter 9 - Introduction to Geometry(10th)</option>
            <option value="10">Chapters 10 - Trignometric Identities(10th)</option>
            <option value="11">Chapters 11 - Heights and Distances:Angle of elevation, Angle of Depression(10th)</option>
            <option value="12">Chapters 12 - Areas Related to Circles(10th)</option>
            <option value="13">Chapters 13 - Surface Areas and Volumes(10th)</option>
            <option value="14">Chapters 14 - Statistics(10th)</option>
            <option value="15">Chapters 15 - Probability(10th)</option>
        </select>
        <button onclick="loadQuiz()">Load Quiz(10th)</button>

        <div id="quiz"></div>
        <button onclick="submitQuiz()">Submit Answers</button>
        <button id="downloadBtn" disabled>Download PDF</button>
        <button onclick="retakeQuiz()">Retake Quiz</button>
        <div id="result"></div>
        <div id="explanation"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
